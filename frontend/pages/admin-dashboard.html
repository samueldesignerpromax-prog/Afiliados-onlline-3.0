<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Plataforma de Afiliados</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="/" class="logo">Affiliate Platform</a>
            <div class="nav-links">
                <a href="/admin-dashboard.html">Dashboard</a>
                <a href="/products.html">Produtos</a>
                <a href="/reports.html">Relatórios</a>
                <a href="#" onclick="logout()">Sair</a>
            </div>
        </nav>
    </header>
    
    <div class="container">
        <h1>Dashboard Admin</h1>
        
        <div class="dashboard-stats" id="stats"></div>
        
        <div class="card">
            <h2>Últimas Vendas</h2>
            <table class="table" id="salesTable">
                <thead>
                    <tr><th>Produto</th><th>Valor</th><th>Data</th><th>Comprador</th></tr>
                </thead>
                <tbody id="salesList"></tbody>
            </table>
        </div>
        
        <div class="card">
            <h2>Usuários</h2>
            <table class="table" id="usersTable">
                <thead>
                    <tr><th>Nome</th><th>Email</th><th>Tipo</th><th>Total Vendas</th><th>Ações</th></tr>
                </thead>
                <tbody id="usersList"></tbody>
            </table>
        </div>
        
        <div class="card">
            <h2>Cadastrar Novo Curso</h2>
            <form id="productForm">
                <div class="form-group">
                    <label>Nome do Curso</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="productDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Preço (R$)</label>
                    <input type="number" id="productPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="productCategory">
                        <option value="tecnologia">Tecnologia</option>
                        <option value="marketing">Marketing Digital</option>
                        <option value="culinaria">Culinária</option>
                        <option value="desenvolvimento">Desenvolvimento Pessoal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>URL da Imagem</label>
                    <input type="url" id="productImage" placeholder="https://exemplo.com/imagem.jpg">
                </div>
                <button type="submit" class="btn">Cadastrar Curso</button>
            </form>
        </div>
    </div>
    
    <script src="/js/main.js"></script>
    <script>
        let currentUser = null;
        
        async function loadAdminData() {
            try {
                const user = getUser();
                if (!user || user.role !== 'admin') {
                    window.location.href = '/login.html';
                    return;
                }
                currentUser = user;
                
                // Load stats
                const stats = await apiCall('/admin?stats=true');
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <h3>Total Usuários</h3>
                        <div class="stat-value">${stats.totalUsers}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Produtos</h3>
                        <div class="stat-value">${stats.totalProducts}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Vendas</h3>
                        <div class="stat-value">${stats.totalSales}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Receita Total</h3>
                        <div class="stat-value">R$ ${stats.totalRevenue.toFixed(2)}</div>
                    </div>
                `;
                
                // Load sales
                const sales = await apiCall('/sales');
                document.getElementById('salesList').innerHTML = sales.slice(0, 10).map(sale => `
                    <tr>
                        <td>${sale.productName}</td>
                        <td>R$ ${sale.amount.toFixed(2)}</td>
                        <td>${new Date(sale.date).toLocaleDateString()}</td>
                        <td>${sale.sellerId}</td>
                    </tr>
                `).join('');
                
                // Load users
                const users = await apiCall('/admin?users=true');
                document.getElementById('usersList').innerHTML = users.map(user => `
                    <tr>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.role}</td>
                        <td>R$ ${user.totalSales.toFixed(2)}</td>
                        <td>
                            <button onclick="banUser('${user.id}')" class="btn btn-danger btn-sm">
                                ${user.isActive ? 'Banir' : 'Desbanir'}
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading admin data:', error);
            }
        }
        
        async function banUser(userId) {
            if (!confirm('Tem certeza?')) return;
            try {
                await apiCall('/admin?ban=true', {
                    method: 'PUT',
                    body: JSON.stringify({ userId, isActive: false })
                });
                loadAdminData();
            } catch (error) {
                alert('Erro ao banir usuário: ' + error.message);
            }
        }
        
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            try {
                await apiCall('/products', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: document.getElementById('productName').value,
                        description: document.getElementById('productDescription').value,
                        price: parseFloat(document.getElementById('productPrice').value),
                        category: document.getElementById('productCategory').value,
                        imageUrl: document.getElementById('productImage').value
                    })
                });
                
                alert('Produto cadastrado com sucesso!');
                document.getElementById('productForm').reset();
            } catch (error) {
                alert('Erro ao cadastrar produto: ' + error.message);
            }
        });
        
        window.banUser = banUser;
        loadAdminData();
    </script>
</body>
</html>
